# Quant Copilot - Default Risk Rules
# Edit these to match your bot's risk profile.
# All amounts are in USDT unless otherwise specified.

# Maximum position size in USDT per single trade
max_position_size: 1000.0

# Maximum total exposure across all open positions
max_total_exposure: 5000.0

# Maximum loss in a 24-hour rolling window before all trading is paused
max_daily_loss: 200.0

# Maximum number of trades that can be placed within a rolling 60-second window
max_trades_per_minute: 3

# Maximum number of identical trades (same symbol, same side) within 60s - prevents infinite loops
max_identical_trades_per_minute: 2

# Drawdown percentage from peak equity that triggers a full kill switch (0.0 - 1.0)
kill_switch_drawdown: 0.10

# Maximum single-order size as a fraction of account equity (0.0 - 1.0)
max_order_pct_of_equity: 0.20

# Maximum allowed slippage in basis points (1 bp = 0.01%) before order is rejected
max_slippage_bps: 50

# Whitelisted trading pairs (empty = all pairs allowed)
allowed_symbols: []

# Blacklisted symbols (takes precedence over whitelist)
blocked_symbols:
  - SCAM/USDT
